<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERTIFIKAT</title>
    <style>
        body {
            margin: 0;
            background-color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; 
        }

        #image-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            cursor: grab;
        }

        #previewImage {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            border: 10px solid #333; 
            box-sizing: border-box;
            transition: transform 0.05s linear; 
            touch-action: none; 
        }
        
        @media print {
            @page {
                size: A4 landscape;
                margin: 0;
            }

            html, body {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                overflow: hidden;
                display: block;
                background: none;
            }

            #image-container {
                width: 100%;
                height: 100%;
                display: block;
            }

            #previewImage {
                width: 100vw;
                height: 100vh;
                object-fit: contain;
                border: none;
                transform: none !important;
            }
        }
    </style>
</head>
<body onload="window.print()">

    <div id="image-container">
        <img id="previewImage" src="Preview.png" alt="Sertifikat Preview">
    </div>

    <script>
        const container = document.getElementById('image-container');
        const image = document.getElementById('previewImage');

        let scale = 0.7;
        let translateX = 0;
        let translateY = 0;

        let isPinching = false;
        let isDragging = false;

        let startX = 0;
        let startY = 0;
        let initialPinchDistance = 0;

        function applyTransform() {
            image.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        applyTransform();

        window.addEventListener('beforeprint', () => {
            scale = 1;
            translateX = 0;
            translateY = 0;
            applyTransform();
        });

        window.addEventListener('afterprint', () => {
            scale = 0.7;
            applyTransform();
        });

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const scaleAmount = -e.deltaY > 0 ? 1.1 : 1 / 1.1;
            scale *= scaleAmount;

            scale = Math.min(Math.max(scale, 0.5), 2);

            applyTransform();
        });

        function getDistance(touches) {
            const [t1, t2] = touches;
            return Math.sqrt(
                Math.pow(t1.clientX - t2.clientX, 2) +
                Math.pow(t1.clientY - t2.clientY, 2)
            );
        }

        container.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX - translateX;
                startY = e.touches[0].clientY - translateY;
            }

            if (e.touches.length === 2) {
                isPinching = true;
                initialPinchDistance = getDistance(e.touches);
            }
        });

        container.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                translateX = e.touches[0].clientX - startX;
                translateY = e.touches[0].clientY - startY;
                applyTransform();
            }

            if (isPinching && e.touches.length === 2) {
                e.preventDefault();
                const currentDistance = getDistance(e.touches);
                const scaleAmount = currentDistance / initialPinchDistance;
                scale *= scaleAmount;
                initialPinchDistance = currentDistance;

                scale = Math.min(Math.max(scale, 0.5), 2);

                applyTransform();
            }
        });

        container.addEventListener('touchend', () => {
            isDragging = false;
            isPinching = false;
        });
    </script>

</body>
</html>
