<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERTIFIKAT</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: Arial, sans-serif;
        }

        .wrapper {
            width: 100%;
            overflow: auto;
        }

        .container {
            width: 1000px;
            height: 700px;
            margin: 40px auto;
            border: 10px solid black;
            box-sizing: border-box;
            background-image: url('Preview.png');
            background-size: cover;
            background-position: center;
        }

        @media (max-width: 768px) {
            .wrapper {
                overflow-x: auto;
            }

            .container {
                width: 100%;
                height: auto;
                aspect-ratio: 1000 / 700;
                margin: 0;
                border: none;
            }
        }

        @media print {
            @page {
                size: A4 landscape;
                margin: 0;
            }

            body {
                margin: 0;
            }

            .wrapper {
                overflow: visible;
            }

            .container {
                width: 100vw;
                height: 100vh;
                margin: 0;
                border: none;
                background-size: contain;
                background-repeat: no-repeat;
                background-position: center;
            }
        }
    </style>
</head>

<body onload="window.print()">

    <div class="wrapper">
        <div class="container"></div>
    </div>

</body>
</html>
